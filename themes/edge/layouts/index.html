{{ define "main" }}

<!-- Sign-in prompt (shown when not authenticated) -->
<div id="signin-prompt" class="text-center py-5">
  <div class="card mx-auto shadow-sm border-0" style="max-width:380px">
    <div class="card-body p-4">
      <i class="bi bi-graph-up-arrow fs-1 text-primary mb-3 d-block"></i>
      <h4 class="fw-semibold mb-1">Market Edge</h4>
      <p class="text-muted small mb-4">NBM ensemble vs Polymarket price comparison</p>
      <button class="btn btn-primary w-100" onclick="signInWithGoogle()">
        <i class="bi bi-google me-2"></i>Sign in with Google
      </button>
    </div>
  </div>
</div>

<!-- Auth guard (signed in but not authorized) -->
<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>Your account is not authorized. Contact the administrator.
</div>

<!-- Controls -->
<div class="card shadow-sm border-0 mb-3 d-none" id="controls-card">
  <div class="card-body py-3">
    <div class="row g-2 align-items-end">
      <div class="col-sm-auto">
        <label class="form-label small fw-medium mb-1" for="sel-city">City</label>
        <select class="form-select form-select-sm" id="sel-city" style="min-width:180px">
          <option value="">— select city —</option>
        </select>
      </div>
      <div class="col-sm-auto">
        <label class="form-label small fw-medium mb-1" for="inp-forecast-date">
          Forecast Date <span class="text-muted fw-normal">(date fetched)</span>
        </label>
        <input type="date" class="form-control form-control-sm" id="inp-forecast-date">
      </div>
      <div class="col-sm-auto">
        <button class="btn btn-primary btn-sm" onclick="loadComparison()">
          <i class="bi bi-arrow-repeat me-1"></i>Load
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="text-center py-5 d-none">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="text-muted small mt-2">Fetching NBM + Polymarket data…</p>
</div>

<!-- Empty state -->
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-inbox fs-1 text-muted"></i>
  <p class="text-muted mt-2">No forecasts found for this city + forecast date.</p>
</div>

<!-- Chart card -->
<div class="card shadow-sm border-0 mb-3 d-none" id="chart-card">
  <div class="card-header bg-transparent border-bottom-0 pt-3 pb-0 d-flex align-items-center gap-3 flex-wrap">
    <span class="fw-medium small">Bracket Comparison</span>
    <select class="form-select form-select-sm" id="chart-date-sel" style="max-width:220px"></select>
    <span class="text-muted small" id="chart-subtitle"></span>
  </div>
  <div class="card-body">
    <canvas id="edge-chart" style="max-height:320px"></canvas>
  </div>
</div>

<!-- Per-date tables (injected by JS) -->
<div id="results-area"></div>

{{ end }}

{{ define "page-scripts" }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ── City list ──────────────────────────────────────────────────────────────
// Slugs must match BQ city slugs AND Polymarket event slug format.
// Update this list to match tracked cities in weather-api.
const CITIES = [
  { slug: 'ankara',       label: 'Ankara',       lat:  39.9334, lon:  32.8597 },
  { slug: 'buenos-aires', label: 'Buenos Aires', lat: -34.6037, lon: -58.3816 },
  { slug: 'chicago',      label: 'Chicago, IL',  lat:  41.8781, lon: -87.6298 },
  { slug: 'dallas',       label: 'Dallas, TX',   lat:  32.7767, lon: -96.7970 },
  { slug: 'london',       label: 'London',       lat:  51.5074, lon:  -0.1278 },
  { slug: 'miami',        label: 'Miami, FL',    lat:  25.7617, lon: -80.1918 },
  { slug: 'nyc',          label: 'New York, NY', lat:  40.7128, lon: -74.0060 },
  { slug: 'paris',        label: 'Paris',        lat:  48.8566, lon:   2.3522 },
  { slug: 'seoul',        label: 'Seoul',        lat:  37.5665, lon: 126.9780 },
  { slug: 'singapore',    label: 'Singapore',    lat:   1.3521, lon: 103.8198 },
  { slug: 'tokyo',        label: 'Tokyo',        lat:  35.6762, lon: 139.6503 },
  { slug: 'toronto',      label: 'Toronto',      lat:  43.6532, lon: -79.3832 },
];

const MONTH_NAMES = ['january','february','march','april','may','june',
                     'july','august','september','october','november','december'];

// Reconstruct the Polymarket event slug (mirrors server-side polymarket_proxy.go logic)
function polymarketEventSlug(citySlug, dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return `highest-temperature-in-${citySlug}-on-${MONTH_NAMES[d.getUTCMonth()]}-${d.getUTCDate()}-${d.getUTCFullYear()}`;
}

// Open-Meteo ensemble visualization URL for a city
function openMeteoURL(city) {
  return `https://open-meteo.com/en/docs/ensemble-api` +
    `#latitude=${city.lat}&longitude=${city.lon}` +
    `&models=gfs_seamless&daily=temperature_2m_max&forecast_days=16`;
}

// ── Bracket parsing ────────────────────────────────────────────────────────
// Returns { type: 'range'|'above'|'below', lo?: number, hi?: number } in °C,
// or null if the text can't be parsed into a bracket.
// parseBracket returns { type, lo?, hi?, unit } in °C.
//
// Polymarket uses Weather Underground which rounds observed temps to the
// nearest whole degree. So "78-79°F" means any actual high that rounds to
// 78 or 79 — i.e. the true range is [77.5, 79.5°F). Boundaries are shifted
// ±0.5 of the original unit before converting to °C so member counts are
// correctly attributed (this also makes consecutive brackets contiguous).
function parseBracket(text) {
  if (!text) return null;
  const t = text.replace(/\u2013|\u2014/g, '-'); // normalize en-dash / em-dash

  // ── °F ranges ──────────────────────────────────────────────────────────────
  // "X-Y°F" / "X°F-Y°F" / "X to Y°F" / "X°F to Y°F"
  let m = t.match(/(\d+(?:\.\d+)?)\s*(?:°\s*[Ff])?\s*(?:-|to)\s*(\d+(?:\.\d+)?)\s*°?\s*[Ff]/i);
  if (m) return { type: 'range', lo: (+m[1] - 0.5 - 32) * 5/9, hi: (+m[2] + 0.5 - 32) * 5/9, unit: 'F' };

  // ── °C ranges ──────────────────────────────────────────────────────────────
  // "X-Y°C" / "X°C-Y°C" / "X to Y°C" / "X°C to Y°C"
  m = t.match(/(\d+(?:\.\d+)?)\s*(?:°\s*[Cc])?\s*(?:-|to)\s*(\d+(?:\.\d+)?)\s*°?\s*[Cc]/i);
  if (m) return { type: 'range', lo: +m[1] - 0.5, hi: +m[2] + 0.5, unit: 'C' };

  // ── °F above ───────────────────────────────────────────────────────────────
  // "above/over/greater than/more than X°F" / "X°F or higher/above/more/greater"
  m = t.match(/(?:above|over|greater\s+than|more\s+than)\s+(\d+(?:\.\d+)?)\s*°?\s*[Ff]/i)
   || t.match(/(\d+(?:\.\d+)?)\s*°?\s*[Ff]\s+or\s+(?:higher|above|more|greater)/i);
  if (m) return { type: 'above', lo: (+m[1] - 0.5 - 32) * 5/9, unit: 'F' };

  // ── °C above ───────────────────────────────────────────────────────────────
  m = t.match(/(?:above|over|greater\s+than|more\s+than)\s+(\d+(?:\.\d+)?)\s*°?\s*[Cc]/i)
   || t.match(/(\d+(?:\.\d+)?)\s*°?\s*[Cc]\s+or\s+(?:higher|above|more|greater)/i);
  if (m) return { type: 'above', lo: +m[1] - 0.5, unit: 'C' };

  // ── °F below ───────────────────────────────────────────────────────────────
  // "below/under/less than X°F" / "X°F or lower/below/less"
  m = t.match(/(?:below|under|less\s+than)\s+(\d+(?:\.\d+)?)\s*°?\s*[Ff]/i)
   || t.match(/(\d+(?:\.\d+)?)\s*°?\s*[Ff]\s+or\s+(?:below|lower|less)/i);
  if (m) return { type: 'below', hi: (+m[1] + 0.5 - 32) * 5/9, unit: 'F' };

  // ── °C below ───────────────────────────────────────────────────────────────
  m = t.match(/(?:below|under|less\s+than)\s+(\d+(?:\.\d+)?)\s*°?\s*[Cc]/i)
   || t.match(/(\d+(?:\.\d+)?)\s*°?\s*[Cc]\s+or\s+(?:below|lower|less)/i);
  if (m) return { type: 'below', hi: +m[1] + 0.5, unit: 'C' };

  return null;
}

// ── Analytical (skew-normal) probability ──────────────────────────────────
// Open-Meteo returns 30 raw member temps; our Go job pre-computes mean/σ/skew
// from those members and stores them in BQ. We use them here to fit a
// skew-normal distribution and get a smooth bracket probability estimate.

function normalCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989422820 * Math.exp(-z * z / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
  return z >= 0 ? 1 - p : p;
}

// Owen's T via 6-point Gauss-Legendre on [0,1]:
// T(h,a) = (a/2π) ∫₀¹ exp(-h²(1+a²u²)/2) / (1+a²u²) du
const _GL6N = [0.033765242898424, 0.169395306766868, 0.380690406977216,
               0.619309593022784, 0.830604693233132, 0.966234757101576];
const _GL6W = [0.085662246189585, 0.180380786524069, 0.233956967286346,
               0.233956967286346, 0.180380786524069, 0.085662246189585];
function owensT(h, a) {
  if (a === 0) return 0;
  const h2 = h * h, a2 = a * a;
  let s = 0;
  for (let i = 0; i < 6; i++) {
    const u = _GL6N[i], d = 1 + a2 * u * u;
    s += _GL6W[i] * Math.exp(-h2 * d / 2) / d;
  }
  return a * s / (2 * Math.PI);
}

// Convert 3rd standardized moment γ to skew-normal shape parameter α
function skewnessToAlpha(gamma) {
  if (!isFinite(gamma) || Math.abs(gamma) < 0.001) return 0;
  const g = Math.max(-0.99, Math.min(0.99, gamma));
  const r = Math.pow(Math.abs(g), 2 / 3);
  const c = Math.pow((4 - Math.PI) / 2, 2 / 3);
  const d = Math.sqrt((Math.PI / 2) * r / (r + c));
  return (g >= 0 ? 1 : -1) * d / Math.sqrt(1 - d * d);
}

// P(bracket) from skew-normal fitted to the ensemble. Returns % or null.
//
// mu and sigma are the sample mean and std dev (NOT the SN location/scale params).
// For SN(xi, omega, alpha): mean = xi + omega*delta*sqrt(2/pi)
//                           std  = omega * sqrt(1 - 2*delta^2/pi)
// We back-calculate xi and omega so the distribution matches the sample statistics.
function fitProb(bracket, mu, sigma, skewness) {
  if (!bracket || !isFinite(mu) || !isFinite(sigma) || sigma <= 0) return null;
  const alpha      = skewnessToAlpha(skewness || 0);
  const delta      = alpha / Math.sqrt(1 + alpha * alpha);
  const meanFactor = delta * Math.sqrt(2 / Math.PI);           // E[(X-xi)/omega]
  const varFactor  = Math.sqrt(1 - meanFactor * meanFactor);   // Std[(X-xi)/omega]
  const omega      = varFactor > 1e-9 ? sigma / varFactor : sigma;
  const xi         = mu - omega * meanFactor;
  const cdf = x => normalCDF((x - xi) / omega) - 2 * owensT((x - xi) / omega, alpha);
  if      (bracket.type === 'range') return Math.max(0, cdf(bracket.hi) - cdf(bracket.lo)) * 100;
  else if (bracket.type === 'above') return Math.max(0, 1 - cdf(bracket.lo)) * 100;
  else if (bracket.type === 'below') return Math.max(0, cdf(bracket.hi)) * 100;
  return null;
}

// Sort key for ordering brackets low → high temperature
function bracketSortKey(bracket) {
  if (!bracket) return 0;
  if (bracket.type === 'below') return bracket.hi - 0.001;  // just before ranges starting at hi
  if (bracket.type === 'range') return bracket.lo;
  if (bracket.type === 'above') return bracket.lo + 10000;  // always last
  return 0;
}

// Count members matching the bracket. Returns { count, n, pct } or null.
function nbmProb(members, bracket) {
  if (!members || !members.length || !bracket) return null;
  const n = members.length;
  let count;
  if      (bracket.type === 'range') count = members.filter(t => t >= bracket.lo && t < bracket.hi).length;
  else if (bracket.type === 'above') count = members.filter(t => t >= bracket.lo).length;
  else if (bracket.type === 'below') count = members.filter(t => t < bracket.hi).length;
  else return null;
  return { count, n, pct: (count / n) * 100 };
}

// ── Polymarket (via backend proxy to avoid CORS) ───────────────────────────
// Returns the markets array for a given city + date, or [] if not found.
async function fetchPolyMarkets(city, targetDate) {
  try {
    const markets = await api('GET', `/polymarket-event?city=${encodeURIComponent(city)}&date=${targetDate}`);
    return Array.isArray(markets) ? markets : [];
  } catch (_) {
    return [];
  }
}

// Returns [yesPrice, noPrice] as numeric strings.
// Prefers the `tokens` field (actual ask prices per outcome, sum > 1 due to spread).
// Falls back to `outcomePrices` (mid prices, sum ≈ 1) if tokens unavailable.
function parseOutcomePrices(market) {
  // tokens: "[{"outcome":"Yes","price":0.25,...},{"outcome":"No","price":0.80,...}]"
  let tokens = market.tokens;
  if (typeof tokens === 'string') {
    try { tokens = JSON.parse(tokens); } catch (_) { tokens = null; }
  }
  if (Array.isArray(tokens) && tokens.length >= 2) {
    const yes = tokens.find(t => /yes/i.test(t.outcome || ''));
    const no  = tokens.find(t => /no/i.test(t.outcome || ''));
    if (yes?.price != null && no?.price != null) {
      return [String(yes.price), String(no.price)];
    }
    // positional fallback if outcome names aren't standard Yes/No
    if (tokens[0]?.price != null && tokens[1]?.price != null) {
      return [String(tokens[0].price), String(tokens[1].price)];
    }
  }
  // Fall back to outcomePrices (mid prices)
  let prices = market.outcomePrices;
  if (typeof prices === 'string') {
    try { prices = JSON.parse(prices); } catch (_) { return null; }
  }
  return Array.isArray(prices) && prices.length ? prices : null;
}

// ── Auth state ─────────────────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(user => {
  const signinEl   = document.getElementById('signin-prompt');
  const guardEl    = document.getElementById('auth-guard');
  const controlsEl = document.getElementById('controls-card');

  if (!user) {
    // signinEl is visible by default; nothing else to show
    return;
  }

  signinEl.classList.add('d-none');

  if (!isEmailAllowed(user.email)) {
    guardEl.classList.remove('d-none');
    return;
  }

  controlsEl.classList.remove('d-none');

  const sel = document.getElementById('sel-city');
  CITIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.slug;
    opt.textContent = c.label;
    sel.appendChild(opt);
  });

  document.getElementById('inp-forecast-date').value = new Date().toISOString().slice(0, 10);
});

// ── Main load ──────────────────────────────────────────────────────────────
let edgeChart = null;
let _combined = [];

async function loadComparison() {
  const city         = document.getElementById('sel-city').value;
  const forecastDate = document.getElementById('inp-forecast-date').value;
  if (!city) { showToast('Please select a city.', 'warning'); return; }

  const loadingEl = document.getElementById('loading');
  const emptyEl   = document.getElementById('empty-state');
  const chartCard = document.getElementById('chart-card');
  const resultsEl = document.getElementById('results-area');

  loadingEl.classList.remove('d-none');
  emptyEl.classList.add('d-none');
  chartCard.classList.add('d-none');
  resultsEl.innerHTML = '';
  _combined = [];

  try {
    const params = { city };
    if (forecastDate) params.forecast_date = forecastDate;
    const rows = await api('GET', '/nbm-forecasts' + qs(params));

    if (!rows || rows.length === 0) {
      loadingEl.classList.add('d-none');
      emptyEl.classList.remove('d-none');
      return;
    }

    // One NBM row per target_date (use whichever comes first)
    const byDate = {};
    rows.forEach(r => { if (!byDate[r.target_date]) byDate[r.target_date] = r; });
    const targetDates = Object.keys(byDate).sort();

    // Fetch all Polymarket markets in parallel via backend proxy
    const polyMarkets = await Promise.all(targetDates.map(d => fetchPolyMarkets(city, d)));

    _combined = targetDates.map((d, i) => ({
      date:    d,
      nbm:     byDate[d],
      markets: polyMarkets[i] || [],
    }));

    loadingEl.classList.add('d-none');
    renderResults();
  } catch (e) {
    loadingEl.classList.add('d-none');
    showToast('Load failed: ' + e.message, 'danger');
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────
function edgeBadge(edge) {
  if (edge === null) return '<span class="text-muted">—</span>';
  const fmt = (edge >= 0 ? '+' : '') + edge.toFixed(1) + '%';
  if (edge > 5)  return `<span class="badge bg-success">${fmt} BET YES</span>`;
  if (edge < -5) return `<span class="badge bg-danger">${fmt} BET NO</span>`;
  return `<span class="text-muted small">${fmt}</span>`;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

// Extract just the temperature bracket portion for short chart labels.
function shortLabel(question) {
  const m = question.match(
    /(\d+(?:\.\d+)?\s*[-\u2013\u2014]\s*\d+(?:\.\d+)?\s*°?[CFcf]|(?:above|below|over|under)\s+\d+(?:\.\d+)?\s*°?[CFcf])/i
  );
  if (m) return m[1];
  return question.length > 36 ? question.slice(0, 34) + '\u2026' : question;
}

function renderResults() {
  const resultsEl = document.getElementById('results-area');
  const chartCard = document.getElementById('chart-card');
  const chartSel  = document.getElementById('chart-date-sel');

  resultsEl.innerHTML = '';
  chartSel.innerHTML  = '';

  const citySlug = document.getElementById('sel-city').value;
  const cityObj  = CITIES.find(c => c.slug === citySlug);

  _combined.forEach(entry => {
    const { date, nbm, markets } = entry;
    const members = (nbm.member_temps && nbm.member_temps.length) ? nbm.member_temps : null;

    // Sort markets low → high temperature then compute one row per bracket
    const sortedMarkets = [...markets].sort((a, b) => {
      const ba = parseBracket(a.question || a.title || '');
      const bb = parseBracket(b.question || b.title || '');
      return bracketSortKey(ba) - bracketSortKey(bb);
    });

    const eventSlug = polymarketEventSlug(citySlug, date);
    const rows = sortedMarkets.map(mkt => {
      const prices    = parseOutcomePrices(mkt);
      const yesPct    = prices ? parseFloat(prices[0]) * 100 : null;
      const noPct     = prices && prices.length > 1 ? parseFloat(prices[1]) * 100 : null;
      const label     = mkt.question || mkt.title || '';
      const bracket   = parseBracket(label);
      const res       = nbmProb(members, bracket);
      const meteoPct  = res ? res.pct : null;
      const meteoEdge = (yesPct !== null && meteoPct !== null) ? meteoPct - yesPct : null;
      const fp        = fitProb(bracket, nbm.predicted_max_temp_c, nbm.temp_std_dev_c, nbm.skewness);
      const fitEdge   = (yesPct !== null && fp !== null) ? fp - yesPct : null;
      // Polymarket market URL — deep-link to specific market if slug available, else event page
      const mktSlug   = mkt.slug || null;
      const pmUrl     = mktSlug
        ? `https://polymarket.com/event/${eventSlug}/${mktSlug}`
        : `https://polymarket.com/event/${eventSlug}`;
      const noRoi = (meteoEdge !== null && meteoEdge < -5 && noPct !== null && meteoPct !== null)
        ? (() => {
            const pNoWins = 1 - meteoPct / 100;
            const noCost  = noPct / 100;
            const ev      = (1 - noCost) * pNoWins - noCost * (1 - pNoWins);
            return { ev, roi: ev / noCost, noCost };
          })()
        : null;
      const fitNoRoi = (fitEdge !== null && fitEdge < -5 && noPct !== null && fp !== null)
        ? (() => {
            const pNoWins = 1 - fp / 100;
            const noCost  = noPct / 100;
            const ev      = (1 - noCost) * pNoWins - noCost * (1 - pNoWins);
            return { ev, roi: ev / noCost, noCost };
          })()
        : null;
      return { label, bracket, yesPct, noPct, meteoPct, meteoCount: res ? res.count : null, meteoN: res ? res.n : null,
               meteoEdge, noRoi, fitPct: fp, fitEdge, fitNoRoi, pmUrl };
    });

    // Date label
    const dateObj   = new Date(date + 'T12:00:00Z');
    const dateLabel = dateObj.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC',
    });

    // Chart date option
    const opt = document.createElement('option');
    opt.value = date;
    opt.textContent = `${dateLabel} (lead ${nbm.lead_days}d)`;
    chartSel.appendChild(opt);

    const pct = v => v !== null ? v.toFixed(1) + '%' : '<span class="text-muted">—</span>';

    // Detect display unit (°F or °C) from the markets for this date
    const allBrackets = rows.map(r => parseBracket(r.label)).filter(Boolean);
    const displayUnit = allBrackets.some(b => b.unit === 'F') ? 'F' : 'C';
    const toDisp      = c => displayUnit === 'F' ? c * 9/5 + 32 : c;  // temp conversion
    const toDispDelta = c => displayUnit === 'F' ? c * 9/5 : c;       // σ: scale only, no offset
    const unitStr     = displayUnit === 'F' ? '°F' : '°C';

    // Members accounted for across all brackets; any remainder has no matching PM market
    const totalMembers = members ? members.length : 0;
    const parsedBrackets = allBrackets; // already computed above
    const unaccountedTemps = members
      ? members.filter(t => !parsedBrackets.some(b => {
          if (b.type === 'range') return t >= b.lo && t < b.hi;
          if (b.type === 'above') return t >= b.lo;
          if (b.type === 'below') return t < b.hi;
          return false;
        }))
      : [];
    const unaccounted = unaccountedTemps.length;

    // Format unaccounted temps in the same unit as the PM markets
    const unaccountedLabels = [...unaccountedTemps]
      .sort((a, b) => a - b)
      .map(t => toDisp(t).toFixed(1) + unitStr)
      .join(', ');

    const unaccountedRow = (unaccounted > 0 && totalMembers > 0) ? `
      <tr class="table-warning">
        <td class="ps-3 text-wrap fst-italic" style="max-width:260px">
          <span class="text-muted">Outside all PM brackets</span>
          <div class="text-muted" style="font-size:.78em;word-break:break-word">${escHtml(unaccountedLabels)}</div>
        </td>
        <td class="text-end text-muted">—</td>
        <td class="text-end text-muted">—</td>
        <td class="text-end text-muted">${(unaccounted / totalMembers * 100).toFixed(1)}%</td>
        <td class="text-end text-muted small">${unaccounted}/${totalMembers}</td>
        <td class="text-center text-muted">—</td>
        <td class="text-end text-muted">—</td>
        <td class="text-end text-muted">—</td>
        <td class="text-center text-muted">—</td>
        <td class="text-end text-muted">—</td>
      </tr>` : '';

    const tableBody = rows.length > 0
      ? rows.map(r => {
          const b = r.bracket;
          const bracketRange = b
            ? (() => {
                const fmt = v => (toDisp(v)).toFixed(1) + unitStr;
                if (b.type === 'range') return `${fmt(b.lo)} – ${fmt(b.hi)}`;
                if (b.type === 'above') return `≥ ${fmt(b.lo)}`;
                if (b.type === 'below') return `< ${fmt(b.hi)}`;
              })()
            : null;
          return `
          <tr>
            <td class="ps-3 text-wrap" style="max-width:260px">
              ${escHtml(r.label)}
              <a href="${escHtml(r.pmUrl)}" target="_blank" rel="noopener"
                 class="ms-1 text-muted" title="View on Polymarket" style="font-size:.75em">
                <i class="bi bi-box-arrow-up-right"></i>
              </a>
              ${bracketRange
                ? `<div class="text-muted" style="font-size:.72em">${escHtml(bracketRange)}</div>`
                : `<div class="text-danger" style="font-size:.72em">bracket not parsed</div>`}
            </td>
            <td class="text-end">${pct(r.yesPct)}</td>
            <td class="text-end">${pct(r.noPct)}</td>
            <td class="text-end">${pct(r.meteoPct)}</td>
            <td class="text-end text-muted small">${r.meteoCount !== null ? r.meteoCount + '/' + r.meteoN : '—'}</td>
            <td class="text-center">${edgeBadge(r.meteoEdge)}</td>
            <td class="text-end">${r.noRoi !== null
              ? `<div class="text-success small fw-medium">${(r.noRoi.roi * 100).toFixed(1)}%</div>
                 <div class="text-muted" style="font-size:.75em">+${(r.noRoi.ev * 100).toFixed(1)}¢&thinsp;/&thinsp;${(r.noRoi.noCost * 100).toFixed(1)}¢</div>`
              : '<span class="text-muted">—</span>'}</td>
            <td class="text-end">${pct(r.fitPct)}</td>
            <td class="text-center">${edgeBadge(r.fitEdge)}</td>
            <td class="text-end">${r.fitNoRoi !== null
              ? `<div class="text-success small fw-medium">${(r.fitNoRoi.roi * 100).toFixed(1)}%</div>
                 <div class="text-muted" style="font-size:.75em">+${(r.fitNoRoi.ev * 100).toFixed(1)}¢&thinsp;/&thinsp;${(r.fitNoRoi.noCost * 100).toFixed(1)}¢</div>`
              : '<span class="text-muted">—</span>'}</td>
          </tr>`;
        }).join('') + unaccountedRow
      : `<tr><td colspan="10" class="ps-3 py-2 text-muted fst-italic">No Polymarket markets found for this date.</td></tr>`;

    const nbmSummary =
      `\u03bc\u202f=\u202f${toDisp(nbm.predicted_max_temp_c).toFixed(1)}${unitStr}` +
      `\u2002\u03c3\u202f=\u202f${toDispDelta(nbm.temp_std_dev_c).toFixed(1)}${unitStr}` +
      `\u2002skew\u202f=\u202f${nbm.skewness.toFixed(2)}` +
      `\u2002p10\u202f=\u202f${toDisp(nbm.p10_temp_c).toFixed(1)}${unitStr}` +
      `\u2002p90\u202f=\u202f${toDisp(nbm.p90_temp_c).toFixed(1)}${unitStr}`;

    const section = document.createElement('div');
    section.className = 'card shadow-sm border-0 mb-3';
    section.innerHTML = `
      <div class="card-header bg-transparent d-flex align-items-center gap-2 flex-wrap py-2">
        <span class="fw-medium">${escHtml(dateLabel)}</span>
        <span class="badge bg-secondary">lead ${nbm.lead_days}d</span>
        <span class="text-muted small ms-auto">${escHtml(nbmSummary)}</span>
        ${cityObj ? `<a href="${escHtml(openMeteoURL(cityObj))}" target="_blank" rel="noopener"
           class="text-muted small ms-2" title="View on Open-Meteo">
           <i class="bi bi-box-arrow-up-right"></i> Open-Meteo
        </a>` : ''}
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 small">
            <thead class="table-light">
              <tr>
                <th class="ps-3" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Temperature range from the Polymarket market">Bracket</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Polymarket asking price for YES — the market&#39;s implied probability that the high temperature falls in this bracket">PM YES%</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Polymarket asking price for NO — the independent ask price to buy a NO position on this bracket. Sourced directly from Polymarket, not derived from YES%.">PM NO%</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Empirical probability from 30 GFS ensemble members: fraction of members whose predicted high falls in this bracket">Meteo Members%</th>
                <th class="text-end text-muted" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Number of ensemble members whose predicted high falls in this bracket, out of 30 total">Members</th>
                <th class="text-center" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Meteo Members% minus PM YES%. Positive = model sees higher probability than the market implies (potential YES value). Negative = market overprices this outcome (potential NO value).">Meteo Raw Edge</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Expected ROI of buying No (raw members edge). Only shown when Meteo Raw Edge flags BET NO. Formula: EV = (1−noCost)×P(No wins) − noCost×P(Yes wins), where P(No wins) = 1 − Meteo Members%.">No ROI</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Skew-normal probability fitted to the ensemble mean, std dev, and skewness. A smooth estimate that works even when few members fall in a bracket.">Meteo Fit%</th>
                <th class="text-center" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Meteo Fit% minus PM YES%. Edge using the analytical skew-normal estimate rather than the raw member count.">Meteo Fit Edge</th>
                <th class="text-end" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Expected ROI of buying No (fit edge). Only shown when Meteo Fit Edge flags BET NO. Same formula as No ROI (raw) but using the skew-normal fitted probability instead of the raw member count.">Fit No ROI</th>
              </tr>
            </thead>
            <tbody>${tableBody}</tbody>
          </table>
        </div>
      </div>`;

    resultsEl.appendChild(section);
  });

  if (_combined.length > 0) {
    chartCard.classList.remove('d-none');
    renderChart(_combined[0].date);
  }

  // Initialise Bootstrap tooltips on all column headers
  resultsEl.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
    new bootstrap.Tooltip(el, { trigger: 'hover' });
  });
}

function renderChart(selectedDate) {
  const entry = _combined.find(c => c.date === selectedDate);
  if (!entry) return;

  const { nbm, markets } = entry;
  const members = (nbm.member_temps && nbm.member_temps.length) ? nbm.member_temps : null;

  const labels   = [];
  const pmData   = [];
  const meteoData = [];
  const fitData  = [];

  const sortedForChart = [...markets].sort((a, b) => {
    const ba = parseBracket(a.question || a.title || '');
    const bb = parseBracket(b.question || b.title || '');
    return bracketSortKey(ba) - bracketSortKey(bb);
  });

  sortedForChart.forEach(mkt => {
    const prices  = parseOutcomePrices(mkt);
    const yesPct  = prices ? parseFloat(prices[0]) * 100 : null;
    const label   = mkt.question || mkt.title || '';
    const bracket = parseBracket(label);
    const res     = nbmProb(members, bracket);
    const fp      = fitProb(bracket, nbm.predicted_max_temp_c, nbm.temp_std_dev_c, nbm.skewness);
    if (yesPct === null && !res && fp === null) return;

    labels.push(shortLabel(label));
    pmData.push(yesPct !== null ? parseFloat(yesPct.toFixed(1)) : null);
    meteoData.push(res ? parseFloat(res.pct.toFixed(1)) : null);
    fitData.push(fp !== null ? parseFloat(fp.toFixed(1)) : null);
  });

  const subtitleEl = document.getElementById('chart-subtitle');
  if (labels.length === 0) {
    subtitleEl.textContent = 'No bracket data for this date.';
    if (edgeChart) { edgeChart.destroy(); edgeChart = null; }
    return;
  }

  const chartBrackets = sortedForChart.map(m => parseBracket(m.question || m.title || '')).filter(Boolean);
  const chartUnit = chartBrackets.some(b => b.unit === 'F') ? 'F' : 'C';
  const chartToDisp = c => chartUnit === 'F' ? c * 9/5 + 32 : c;
  const chartUnitStr = chartUnit === 'F' ? '°F' : '°C';
  subtitleEl.textContent =
    `lead ${nbm.lead_days}d \u2014 \u03bc\u202f=\u202f${chartToDisp(nbm.predicted_max_temp_c).toFixed(1)}${chartUnitStr}`;

  if (edgeChart) edgeChart.destroy();
  edgeChart = new Chart(document.getElementById('edge-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Polymarket YES%',
          data: pmData,
          backgroundColor: 'rgba(253,126,20,0.75)',
          borderColor:     'rgba(253,126,20,1)',
          borderWidth: 1,
          borderRadius: 3,
        },
        {
          label: 'Meteo Members%',
          data: meteoData,
          backgroundColor: 'rgba(13,110,253,0.65)',
          borderColor:     'rgba(13,110,253,0.9)',
          borderWidth: 1,
          borderRadius: 3,
        },
        {
          label: 'Meteo Fit%',
          data: fitData,
          backgroundColor: 'rgba(25,135,84,0.65)',
          borderColor:     'rgba(25,135,84,0.9)',
          borderWidth: 1,
          borderRadius: 3,
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y !== null
              ? `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`
              : `${ctx.dataset.label}: \u2014`,
          },
        },
      },
      scales: {
        x: { title: { display: true, text: 'Bracket' } },
        y: {
          title:       { display: true, text: 'Probability (%)' },
          ticks:       { callback: v => v + '%' },
          beginAtZero: true,
          max:         100,
        },
      },
    },
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chart-date-sel').addEventListener('change', e => {
    renderChart(e.target.value);
  });
});
</script>
